<body class="bg-gray-100 p-4 overflow-x-hidden relative min-h-screen flex flex-col">

      <h1 class="text-xl font-bold text-center">차량조회·등록</h1>
      <div class="absolute top-0 right-0 text-sm">

    <section id="adminMenu" class="hidden space-y-4">
      <details class="accordion">
        <summary class="cursor-pointer text-lg font-semibold bg-gray-200 p-3 rounded-lg">신규 등록</summary>
        <div class="mt-3 space-y-2">
          <input id="name" type="text" placeholder="이름" class="w-full p-3 border rounded-lg text-lg">
          <select id="org" class="w-full p-3 border rounded-lg text-lg">
            <option value="국세공무원교육원">국세공무원교육원</option>
            <option value="국세상담센터">국세상담센터</option>
            <option value="주류면허지원센터">주류면허지원센터</option>
            <option value="서귀포지서">서귀포지서</option>
            <option value="재직교육생">재직교육생</option>
            <option value="신규교육생">신규교육생</option>

          <input id="phone" type="text" placeholder="전화번호" class="w-full p-3 border rounded-lg text-lg">
          <input id="carNum" type="text" placeholder="차량번호" class="w-full p-3 border rounded-lg text-lg">
          <input id="carType" type="text" placeholder="차종" class="w-full p-3 border rounded-lg text-lg">
          <label class="block text-sm font-medium text-gray-600">차량5부제 예외</label>
          <select id="isException" class="w-full p-3 border rounded-lg text-lg">
            <option value="X">X (대상)</option>
            <option value="O">O (예외)</option>
          </select>
          <button onclick="saveData()" class="w-full bg-green-500 text-white py-3 rounded-lg text-lg">등록</button>
        </div>
      </details>

      <details class="accordion" id="dataManagementDetails">
        <summary class="cursor-pointer text-lg font-semibold bg-gray-200 p-3 rounded-lg">데이터 관리 (수정/삭제)</summary>
        <div class="mt-3 space-y-3">
          <div class="flex flex-col gap-2 p-3 bg-blue-50 rounded-lg border border-blue-200">
            <label class="text-xs text-blue-700 font-bold">목록 내 검색 (이름/소속/번호/예외여부 O,X)</label>
            <div class="flex items-center gap-2">
              <input id="listFilter" type="text" placeholder="검색어 입력..." 
                     class="flex-1 p-2 border rounded-lg text-sm" oninput="initListSearch()">

            <button onclick="deleteSelectedData()" class="flex-1 bg-red-400 text-white py-3 rounded-lg font-bold text-sm">선택 항목 삭제</button>
          </div>
          <button onclick="exportCurrentData()" class="w-full bg-gray-500 text-white py-3 rounded-lg font-bold text-sm mt-2">엑셀 다운로드</button>
          <button onclick="deleteAllData()" class="w-full bg-red-700 text-white py-2 rounded-lg text-xs font-bold mt-4 opacity-50">데이터 전체 삭제</button>
        </div>
      </details>
    </section>
  </div>

  <div class="text-right w-full p-2 text-sm text-gray-500 mt-auto">made by Banseok Kim</div>

  <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-40 fade-in flex items-center justify-center z-50">

      <button onclick="closeLoginModal()" class="absolute top-2 right-2 text-gray-500 text-lg">&times;</button>
      <h2 class="text-lg font-bold mb-4 text-center">로그인</h2>

      <input id="loginPw" type="password" placeholder="비밀번호" class="w-full p-2 border rounded-lg mb-3" onkeypress="if(event.keyCode==13) checkLogin()">
      <div class="flex justify-between gap-2">
        <button onclick="checkLogin()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg">로그인</button>
        <button onclick="closeLoginModal()" class="flex-1 bg-gray-400 text-white py-2 rounded-lg">취소</button>
      </div>
    </div>

  <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-40 fade-in flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg p-6 w-80 relative">
      <button onclick="closeEditModal()" class="absolute top-2 right-2 text-gray-500 text-lg">&times;</button>
      <h2 class="text-lg font-bold mb-2 text-center">선택 항목 수정 (<span id="editCount">0</span>건)</h2>
      <p id="editModalHelp" class="text-xs text-red-500 mb-4 text-center hidden">※ 다수 선택 시: 변경할 항목만 입력하세요.<br>빈칸은 기존 데이터가 유지됩니다.</p>

            <option value="주류면허지원센터">주류면허지원센터</option>
            <option value="서귀포지서">서귀포지서</option>
            <option value="재직교육생">재직교육생</option>
            <option value="신규교육생">신규교육생</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">전화번호</label>
          <input id="editModalPhone" type="text" placeholder="변경 시 입력" class="w-full p-2 border rounded-lg text-sm">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">차종</label>
          <input id="editModalCarType" type="text" placeholder="변경 시 입력" class="w-full p-2 border rounded-lg text-sm">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">차량5부제 예외 여부</label>
          <select id="editModalEx" class="w-full p-2 border rounded-lg text-sm">
            <option value="">변경 없음</option>
            <option value="O">예외 (O)</option>

        </div>
        <div class="flex justify-between gap-2 mt-5">
          <button onclick="saveEditData()" class="flex-1 bg-orange-500 text-white py-2 rounded-lg font-bold">저장</button>
          <button onclick="closeEditModal()" class="flex-1 bg-gray-400 text-white py-2 rounded-lg font-bold">취소</button>
        </div>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, writeBatch } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-yJWX6qRnkWpHWLqyWyr6NFw7kQDPStA",
    authDomain: "car-check-ae332.firebaseapp.com",
    projectId: "car-check-ae332",
    storageBucket: "car-check-ae332.firebasestorage.app",
    messagingSenderId: "571761357854",
    appId: "1:571761357854:web:f66390904bcbc00c3faa0f",
    measurementId: "G-ME6S29Z2CJ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const SECRET_KEY = "MyStrongSecretKey123!";

  function encrypt(text){ return CryptoJS.AES.encrypt(text, SECRET_KEY).toString(); }
  function decrypt(cipher){ try{return CryptoJS.AES.decrypt(cipher, SECRET_KEY).toString(CryptoJS.enc.Utf8);}catch{return cipher;} }

  let currentRole = null;
  let foundElements = [];
  let currentIndex = -1;

  // --- 목록 로드 (수정을 위한 데이터 속성 추가) ---
  window.loadSelectDeleteList = async function(){
    const listDiv = document.getElementById("selectDeleteList");
    if(!listDiv || currentRole !== 'admin') return;
    const snap = await getDocs(collection(db, "cars"));
    listDiv.innerHTML = "";
    snap.forEach(docSnap => {
      const d = docSnap.data();
      const n = decrypt(d.name), o = decrypt(d.org), t = decrypt(d.carType), c = decrypt(d.carNum), p = decrypt(d.phone);
      const ex = d.exception ? decrypt(d.exception) : 'X';
      
      listDiv.innerHTML += `
        <label class="flex items-start space-x-2 border-b py-2 px-1 delete-item" data-search="${n}${o}${t}${c}${p
