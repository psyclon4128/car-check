<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국세공무원교육원 차량조회·등록</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    details[open] summary ~ * { animation: sweep .3s ease-in-out; }
    @keyframes sweep { from {opacity: 0; margin-top: -10px;} to {opacity: 1; margin-top: 0;} }
  </style>
</head>
<body class="bg-gray-100 p-4 overflow-x-hidden relative min-h-screen flex flex-col">

  <div class="w-full max-w-screen-sm mx-auto bg-white p-6 rounded-xl shadow-md flex-1 relative">
    <div class="mb-4 flex flex-col items-center relative">
      <a href="https://car-check.onrender.com/" target="_blank"><img src="국세공무원교육원.png" alt="국세공무원교육원" class="w-40 max-w-full mb-1"></a>
      <h1 class="text-xl font-bold text-center">차량조회·등록</h1>
      <div class="absolute top-0 right-0 text-sm">
        <button id="loginBtn" onclick="openLoginModal()" class="text-blue-600 underline">로그인</button>
        <button id="logoutBtn" onclick="logout()" class="hidden text-red-600 underline">로그아웃</button>
      </div>
    </div>

    <section class="mb-6">
      <h2 class="text-lg font-semibold mb-2">차량번호 검색</h2>
      <input id="searchNum" type="text" placeholder="차량번호 뒷자리 4자리" maxlength="4" 
             class="w-full p-3 border rounded-lg mb-3 text-lg" onkeypress="if(event.keyCode==13) searchCar()">
      <button id="searchBtn" onclick="searchCar()" 
              class="w-full bg-blue-500 text-white py-3 rounded-lg text-lg" disabled>검색 (로그인 필요)</button>
      <div id="searchResult" class="mt-4 text-lg"></div>
    </section>

    <section id="adminMenu" class="hidden space-y-4">
      <details class="accordion">
        <summary class="cursor-pointer text-lg font-semibold bg-gray-200 p-3 rounded-lg">신규 등록</summary>
        <div class="mt-3">
          <input id="name" type="text" placeholder="이름" class="w-full p-3 border rounded-lg mb-3 text-lg">
          <label class="block mb-2 text-lg font-medium">소속</label>
          <select id="org" class="w-full p-3 border rounded-lg mb-3 text-lg">
            <option value="국세공무원교육원">국세공무원교육원</option>
            <option value="국세상담센터">국세상담센터</option>
            <option value="주류면허지원센터">주류면허지원센터</option>
            <option value="서귀포지서">서귀포지서</option>
            <option value="재직교육생">재직교육생</option>
            <option value="신규교육생">신규교육생</option>
            <option value="기타">기타</option>
          </select>
          <input id="phone" type="text" placeholder="전화번호" class="w-full p-3 border rounded-lg mb-3 text-lg">
          <input id="carNum" type="text" placeholder="차량번호" class="w-full p-3 border rounded-lg mb-3 text-lg">
          <input id="carType" type="text" placeholder="차종" class="w-full p-3 border rounded-lg mb-3 text-lg">
          
          <label class="block mb-2 text-lg font-medium">차량5부제 예외</label>
          <select id="isException" class="w-full p-3 border rounded-lg mb-3 text-lg">
            <option value="X">X</option>
            <option value="O">O</option>
          </select>

          <label class="block mb-2 text-lg font-medium">출입기간</label>
          <select id="expireOption" class="w-full p-3 border rounded-lg mb-3 text-lg" onchange="toggleExpireDate()">
            <option value="always">항상</option>
            <option value="date">날짜 선택</option>
          </select>
          <input id="expireDate" type="date" class="w-full p-3 border rounded-lg mb-3 text-lg hidden">

          <button onclick="saveData()" class="w-full bg-green-500 text-white py-3 rounded-lg text-lg">등록</button>
        </div>
      </details>

      <details class="accordion">
        <summary class="cursor-pointer text-lg font-semibold bg-gray-200 p-3 rounded-lg">엑셀 업로드/다운로드</summary>
        <div class="mt-3">
          <p class="text-xs text-gray-500 mb-2">* 엑셀 항목: 이름, 소속, 전화번호, 차량번호, 차종, 차량5부제 예외(O/X), 출입기간</p>
          <input type="file" id="excelFile" class="w-full mb-3 text-lg">
          <div class="flex flex-col sm:flex-row gap-3">
            <button onclick="uploadExcel()" class="flex-1 bg-purple-500 text-white py-3 rounded-lg text-lg">업로드</button>
            <button onclick="exportCurrentData()" class="flex-1 bg-gray-500 text-white py-3 rounded-lg text-lg">현재 데이터 다운로드</button>
          </div>
        </div>
      </details>

      <details class="accordion">
        <summary class="cursor-pointer text-lg font-semibold bg-gray-200 p-3 rounded-lg">데이터 일괄삭제</summary>
        <div class="mt-3">
          <button onclick="deleteAllData()" class="w-full bg-red-500 text-white py-3 rounded-lg text-lg">전체 삭제 실행</button>
        </div>
      </details>

      <details class="accordion">
        <summary class="cursor-pointer text-lg font-semibold bg-gray-200 p-3 rounded-lg">선택 삭제</summary>
        <div class="mt-3">
          <div id="selectDeleteList" class="mb-3 space-y-2 text-lg"></div>
          <button onclick="deleteSelectedData()" class="w-full bg-red-400 text-white py-3 rounded-lg text-lg">선택 삭제 실행</button>
        </div>
      </details>
    </section>
  </div>

  <div class="text-right w-full p-2 text-sm text-gray-500 mt-auto">made by Banseok Kim</div>

  <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-40 fade-in flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg p-6 w-80 relative">
      <button onclick="closeLoginModal()" class="absolute top-2 right-2 text-gray-500 text-lg">&times;</button>
      <h2 class="text-lg font-bold mb-4 text-center">로그인</h2>
      <input id="loginId" type="text" placeholder="아이디" class="w-full p-2 border rounded-lg mb-3" onkeypress="if(event.keyCode==13) checkLogin()">
      <input id="loginPw" type="password" placeholder="비밀번호" class="w-full p-2 border rounded-lg mb-3" onkeypress="if(event.keyCode==13) checkLogin()">
      <div class="flex justify-between gap-2">
        <button onclick="checkLogin()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg">로그인</button>
        <button onclick="closeLoginModal()" class="flex-1 bg-gray-400 text-white py-2 rounded-lg">취소</button>
      </div>
      <p id="loginMsg" class="text-red-500 text-sm mt-2 text-center"></p>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-yJWX6qRnkWpHWLqyWyr6NFw7kQDPStA",
    authDomain: "car-check-ae332.firebaseapp.com",
    projectId: "car-check-ae332",
    storageBucket: "car-check-ae332.firebasestorage.app",
    messagingSenderId: "571761357854",
    appId: "1:571761357854:web:f66390904bcbc00c3faa0f",
    measurementId: "G-ME6S29Z2CJ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const SECRET_KEY = "MyStrongSecretKey123!";

  function encrypt(text){ return CryptoJS.AES.encrypt(text, SECRET_KEY).toString(); }
  function decrypt(cipher){ try{return CryptoJS.AES.decrypt(cipher, SECRET_KEY).toString(CryptoJS.enc.Utf8);}catch{return cipher;} }

  let currentRole = null;

  window.toggleExpireDate = function(){
    const option = document.getElementById("expireOption").value;
    document.getElementById("expireDate").classList.toggle("hidden", option !== "date");
  }

  // 5부제 판별 및 예외 상시 표기 로직
  function getCarStatus(carNum, isException) {
    // 1. 예외 대상인 경우: 요일 상관없이 항상 표시
    if (isException === 'O') {
      return { text: '차량5부제 예외', color: 'text-blue-600', isViolated: false };
    }
    
    const last = parseInt(carNum.slice(-1));
    if (isNaN(last)) return null;

    const day = new Date().getDay(); // 1(월)~5(금)
    const rules = { 1:[1,6], 2:[2,7], 3:[3,8], 4:[4,9], 5:[5,0] };

    // 2. 위반일 경우에만 표시
    if (rules[day] && rules[day].includes(last)) {
      return { text: '차량5부제 위반', color: 'text-red-600', isViolated: true };
    }
    return null;
  }

  window.searchCar = async function() {
    const num = document.getElementById('searchNum').value.trim();
    const resultDiv = document.getElementById('searchResult');
    resultDiv.innerHTML = "";
    if (num.length !== 4) return;

    const snap = await getDocs(collection(db, "cars"));
    const today = new Date().toISOString().split('T')[0];

    for (let docSnap of snap.docs){
      const d = docSnap.data();
      const carNum = decrypt(d.carNum);
      const isEx = d.exception ? decrypt(d.exception) : 'X';
      const expire = d.expireDate ? decrypt(d.expireDate) : null;

      if (expire && expire < today){ await deleteDoc(doc(db,"cars",docSnap.id)); continue; }

      if (carNum.slice(-4) === num){
        const status = getCarStatus(carNum, isEx);
        let html = `<div class="border p-4 rounded-lg mb-3 bg-gray-50 text-lg border-l-4 ${status && status.isViolated ? 'border-l-red-500' : 'border-l-blue-500'}">
          <p><b>이름:</b> ${decrypt(d.name)}</p>
          <p><b>소속:</b> ${decrypt(d.org)}</p>`;
        if(currentRole === 'admin') html += `<p><b>전화번호:</b> ${decrypt(d.phone)}</p>`;
        html += `<p><b>차량번호:</b> ${carNum}</p><p><b>차종:</b> ${decrypt(d.carType)}</p>`;
        
        // 상태 표시 (예외 대상은 항상, 위반 차량은 위반일 때만)
        if(status) html += `<p><b>상태:</b> <span class="font-bold ${status.color}">${status.text}</span></p>`;
        
        if(expire) html += `<p><b>만료일:</b> ${expire}</p>`;
        if(currentRole === 'admin') html += `<button onclick="deleteSingleData('${docSnap.id}')" class="mt-2 bg-red-500 text-white px-2 py-1 rounded text-sm">삭제</button>`;
        html += `</div>`;
        resultDiv.innerHTML += html;
      }
    }
  }

  window.saveData = async function(){
    const data = {
      name: encrypt(document.getElementById('name').value),
      org: encrypt(document.getElementById('org').value),
      phone: encrypt(document.getElementById('phone').value),
      carNum: encrypt(document.getElementById('carNum').value),
      carType: encrypt(document.getElementById('carType').value),
      exception: encrypt(document.getElementById('isException').value),
      expireDate: document.getElementById('expireOption').value === 'date' ? encrypt(document.getElementById('expireDate').value) : null
    };
    await setDoc(doc(db,"cars",document.getElementById('carNum').value), data);
    alert("등록 완료"); loadSelectDeleteList();
  }

  window.uploadExcel = async () => {
    const file = document.getElementById("excelFile").files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const workbook = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
      for (const r of rows) {
        const cn = String(r["차량번호"] || "");
        if(!cn) continue;
        await setDoc(doc(db, "cars", cn), {
          name:encrypt(String(r["이름"]||"")), org:encrypt(String(r["소속"]||"")), phone:encrypt(String(r["전화번호"]||"")),
          carNum:encrypt(cn), carType:encrypt(String(r["차종"]||"")),
          exception:encrypt(r["차량5부제 예외"] === "O" ? "O" : "X"),
          expireDate: r["출입기간"] && r["출입기간"]!=="항상" ? encrypt(String(r["출입기간"])) : null
        });
      }
      alert("업로드 완료"); loadSelectDeleteList();
    };
    reader.readAsArrayBuffer(file);
  };

  // 엑셀 다운로드 (드롭다운 기능 보강)
  window.exportCurrentData = async function(){
    const snap=await getDocs(collection(db,"cars"));
    const data = [["이름", "소속", "전화번호", "차량번호", "차종", "차량5부제 예외", "출입기간"]];
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      data.push([decrypt(d.name), decrypt(d.org), decrypt(d.phone), decrypt(d.carNum), decrypt(d.carType), d.exception ? decrypt(d.exception) : "X", d.expireDate ? decrypt(d.expireDate) : "항상"]);
    });

    const ws = XLSX.utils.aoa_to_sheet(data);

    /* 데이터 유효성 검사 (드롭다운) 설정 */
    if(!ws['!dataValidation']) ws['!dataValidation'] = [];
    ws['!dataValidation'].push({
      sqref: "F2:F1000", // F열(예외항목) 2행부터 1000행까지
      type: 'list',
      formula1: '"O,X"', // O 또는 X 선택
      allowBlank: true,
      showDropDown: true,
      showErrorMessage: true,
      errorTitle: '입력 제한',
      error: '리스트에 있는 O 또는 X만 입력 가능합니다.'
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "차량목록");
    
    // 드롭다운이 포함된 파일은 일반 writeFile보다 아래 형식이 안전함
    XLSX.writeFile(wb, "국세공무원교육원_차량관리.xlsx", { bookType: 'xlsx', type: 'binary' });
  }

  window.checkLogin=function(){
    const id=document.getElementById('loginId').value;
    const pw=document.getElementById('loginPw').value;
    if(id==="admin"&&pw==="rydbrdnjs1!") localStorage.setItem("role","admin");
    else if(id==="user"&&pw==="12345") localStorage.setItem("role","user");
    else { alert("정보 오류"); return; }
    applyRole(); closeLoginModal();
  }
  
  window.logout=function(){ localStorage.removeItem("role"); applyRole(); }
  
  function applyRole(){
    const role=localStorage.getItem("role");
    currentRole=role;
    document.getElementById("searchBtn").disabled=!role;
    document.getElementById("adminMenu").classList.toggle("hidden", role!=="admin");
    document.getElementById("loginBtn").classList.toggle("hidden", !!role);
    document.getElementById("logoutBtn").classList.toggle("hidden", !role);
    if(role==="admin") loadSelectDeleteList();
  }

  window.openLoginModal=function(){ document.getElementById("loginModal").classList.remove("hidden"); document.getElementById("loginId").focus(); }
  window.closeLoginModal=function(){ document.getElementById("loginModal").classList.add("hidden"); }

  async function loadSelectDeleteList(){
    const listDiv=document.getElementById("selectDeleteList");
    if(!listDiv || currentRole !== 'admin') return;
    const snap=await getDocs(collection(db,"cars"));
    listDiv.innerHTML="";
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      listDiv.innerHTML+=`<label class="flex items-center space-x-2 border-b py-1">
        <input type="checkbox" value="${docSnap.id}" class="deleteCheckbox w-5 h-5">
        <span>${decrypt(d.name)} (${decrypt(d.carNum)})</span></label>`;
    });
  }
  window.onload=applyRole;
</script>
</body>
</html>
