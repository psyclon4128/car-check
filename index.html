<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국세공무원교육원 차량조회·등록</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    details[open] summary ~ * { animation: sweep .3s ease-in-out; }
    @keyframes sweep { from {opacity: 0; margin-top: -10px;} to {opacity: 1; margin-top: 0;} }
  </style>
</head>
<body class="bg-gray-100 p-4 overflow-x-hidden relative min-h-screen flex flex-col">

  <div class="w-full max-w-screen-sm mx-auto bg-white p-6 rounded-xl shadow-md flex-1 relative">
    <div class="mb-4 flex flex-col items-center relative">
      <a href="https://car-check.onrender.com/" target="_blank"><img src="국세공무원교육원.png" alt="국세공무원교육원" class="w-40 max-w-full mb-1"></a>
      <h1 class="text-xl font-bold text-center">차량조회·등록</h1>
      <div class="absolute top-0 right-0 text-sm">
        <button id="loginBtn" onclick="openLoginModal()" class="text-blue-600 underline">로그인</button>
        <button id="logoutBtn" onclick="logout()" class="hidden text-red-600 underline">로그아웃</button>
      </div>
    </div>

    <section class="mb-6">
      <h2 class="text-lg font-semibold mb-2">차량번호 검색</h2>
      <input id="searchNum" type="text" placeholder="차량번호 뒷자리 4자리" maxlength="4" 
             class="w-full p-3 border rounded-lg mb-3 text-lg" onkeypress="if(event.keyCode==13) searchCar()">
      <button id="searchBtn" onclick="searchCar()" 
              class="w-full bg-blue-500 text-white py-3 rounded-lg text-lg" disabled>검색 (로그인 필요)</button>
      <div id="searchResult" class="mt-4 text-lg"></div>
    </section>

    <section id="adminMenu" class="hidden space-y-4">
      <details class="accordion">
        <summary class="cursor-pointer text-lg font-semibold bg-gray-200 p-3 rounded-lg">신규 등록</summary>
        <div class="mt-3">
          <input id="name" type="text" placeholder="이름" class="w-full p-3 border rounded-lg mb-3 text-lg">
          <select id="org" class="w-full p-3 border rounded-lg mb-3 text-lg">
            <option value="국세공무원교육원">국세공무원교육원</option>
            <option value="국세상담센터">국세상담센터</option>
            <option value="주류면허지원센터">주류면허지원센터</option>
            <option value="서귀포지서">서귀포지서</option>
            <option value="재직교육생">재직교육생</option>
            <option value="신규교육생">신규교육생</option>
            <option value="기타">기타</option>
          </select>
          <input id="phone" type="text" placeholder="전화번호" class="w-full p-3 border rounded-lg mb-3 text-lg">
          <input id="carNum" type="text" placeholder="차량번호" class="w-full p-3 border rounded-lg mb-3 text-lg">
          <input id="carType" type="text" placeholder="차종" class="w-full p-3 border rounded-lg mb-3 text-lg">
          <label class="block mb-1 text-sm">차량5부제 예외 여부</label>
          <select id="isException" class="w-full p-3 border rounded-lg mb-3 text-lg">
            <option value="X">X</option>
            <option value="O">O</option>
          </select>
          <button onclick="saveData()" class="w-full bg-green-500 text-white py-3 rounded-lg text-lg">등록</button>
        </div>
      </details>

      <details class="accordion">
        <summary class="cursor-pointer text-lg font-semibold bg-gray-200 p-3 rounded-lg">엑셀 관리</summary>
        <div class="mt-3 space-y-3">
          <input type="file" id="excelFile" class="w-full border p-2">
          <button onclick="uploadExcel()" class="w-full bg-purple-500 text-white py-2 rounded-lg">업로드</button>
          <button onclick="exportCurrentData()" class="w-full bg-gray-600 text-white py-2 rounded-lg">데이터 다운로드 (O,X 선택박스 포함)</button>
        </div>
      </details>
    </section>
  </div>

<script type="module">
  // Firebase 설정 생략 (기존 설정 유지)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-yJWX6qRnkWpHWLqyWyr6NFw7kQDPStA",
    authDomain: "car-check-ae332.firebaseapp.com",
    projectId: "car-check-ae332",
    storageBucket: "car-check-ae332.firebasestorage.app",
    messagingSenderId: "571761357854",
    appId: "1:571761357854:web:f66390904bcbc00c3faa0f",
    measurementId: "G-ME6S29Z2CJ"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const SECRET_KEY = "MyStrongSecretKey123!";

  function encrypt(text){ return CryptoJS.AES.encrypt(text, SECRET_KEY).toString(); }
  function decrypt(cipher){ try{return CryptoJS.AES.decrypt(cipher, SECRET_KEY).toString(CryptoJS.enc.Utf8);}catch{return cipher;} }

  // 조회 시 예외대상 항상 표시 로직
  window.searchCar = async function() {
    const num = document.getElementById('searchNum').value.trim();
    const resultDiv = document.getElementById('searchResult');
    resultDiv.innerHTML = "";
    if(num.length < 4) return;

    const snap = await getDocs(collection(db, "cars"));
    const day = new Date().getDay();
    const rules = { 1:[1,6], 2:[2,7], 3:[3,8], 4:[4,9], 5:[5,0] };

    snap.forEach(docSnap => {
      const d = docSnap.data();
      const carNum = decrypt(d.carNum);
      const isEx = d.exception ? decrypt(d.exception) : 'X';
      
      if(carNum.slice(-4) === num) {
        const lastDigit = parseInt(carNum.slice(-1));
        const isViolated = !isNaN(lastDigit) && rules[day] && rules[day].includes(lastDigit);
        
        let html = `<div class="border p-4 rounded-lg mb-3 bg-gray-50 border-l-4 ${isViolated && isEx === 'X' ? 'border-l-red-500' : 'border-l-blue-500'}">
          <p><b>이름:</b> ${decrypt(d.name)}</p>
          <p><b>소속:</b> ${decrypt(d.org)}</p>
          <p><b>차량번호:</b> ${carNum}</p>
          <p><b>차종:</b> ${decrypt(d.carType)}</p>`;
        
        // 핵심: 예외 대상(O)은 요일 상관없이 항상 표시
        if(isEx === 'O') {
          html += `<p class="mt-2 text-blue-600 font-bold">● 차량5부제 예외대상</p>`;
        } else if(isViolated) {
          html += `<p class="mt-2 text-red-600 font-bold">● 차량5부제 위반 (오늘 운행제한)</p>`;
        }
        
        html += `</div>`;
        resultDiv.innerHTML += html;
      }
    });
  };

  // 엑셀 다운로드 (데이터 유효성 검사 강화 버전)
  window.exportCurrentData = async function() {
    const snap = await getDocs(collection(db, "cars"));
    const rows = [["이름", "소속", "전화번호", "차량번호", "차종", "차량5부제 예외", "출입기간"]];
    
    snap.forEach(docSnap => {
      const d = docSnap.data();
      rows.push([
        decrypt(d.name), decrypt(d.org), decrypt(d.phone),
        decrypt(d.carNum), decrypt(d.carType),
        d.exception ? decrypt(d.exception) : "X",
        d.expireDate ? decrypt(d.expireDate) : "항상"
      ]);
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);

    // 엑셀 2021용 유효성 검사 설정
    ws['!dataValidation'] = [
      {
        sqref: "F2:F2000", // F열(예외 여부) 전체 적용
        type: 'list',
        formula1: '"O,X"', // 반드시 큰따옴표 안에 쉼표로 구분
        showDropDown: true,
        allowBlank: true,
        promptTitle: '선택 안내',
        prompt: '목록에서 O 또는 X를 선택하세요.',
        errorTitle: '입력 오류',
        error: 'O 또는 X만 입력 가능합니다.'
      }
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "현황");

    // 엑셀 2021 호환성을 높이는 최적화 옵션 적용
    const wbout = XLSX.write(wb, { 
      bookType: 'xlsx', 
      type: 'binary',
      bookSST: true  // Shared String Table 사용 (호환성 향상)
    });

    function s2ab(s) {
      const buf = new ArrayBuffer(s.length);
      const view = new Uint8Array(buf);
      for (let i=0; i<s.length; i++) view[i] = s.charCodeAt(i) & 0xFF;
      return buf;
    }

    const blob = new Blob([s2ab(wbout)], {type:"application/octet-stream"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "국세공무원교육원_차량관리.xlsx";
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // 로그인/로그아웃 등 나머지 함수는 기존과 동일하게 유지
  // (checkLogin에서 엔터키 이벤트는 HTML의 onkeypress로 이미 적용됨)
  window.checkLogin = function() {
    const id = document.getElementById('loginId').value;
    const pw = document.getElementById('loginPw').value;
    if(id === "admin" && pw === "rydbrdnjs1!") {
      localStorage.setItem("role", "admin");
      location.reload();
    } else {
      alert("로그인 정보가 올바르지 않습니다.");
    }
  };

  window.openLoginModal = () => document.getElementById('loginModal').classList.remove('hidden');
  window.closeLoginModal = () => document.getElementById('loginModal').classList.add('hidden');
  window.logout = () => { localStorage.removeItem("role"); location.reload(); };

  function applyRole() {
    const role = localStorage.getItem("role");
    if(role) {
      document.getElementById("searchBtn").disabled = false;
      document.getElementById("searchBtn").innerText = "검색";
      document.getElementById("loginBtn").classList.add("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");
      if(role === "admin") document.getElementById("adminMenu").classList.remove("hidden");
    }
  }
  window.onload = applyRole;
</script>

<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
  <div class="bg-white p-6 rounded-lg w-80">
    <h2 class="text-lg font-bold mb-4">관리자 로그인</h2>
    <input id="loginId" type="text" placeholder="아이디" class="w-full p-2 border mb-2" onkeypress="if(event.keyCode==13) checkLogin()">
    <input id="loginPw" type="password" placeholder="비밀번호" class="w-full p-2 border mb-4" onkeypress="if(event.keyCode==13) checkLogin()">
    <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-2 rounded">로그인</button>
    <button onclick="closeLoginModal()" class="w-full mt-2 text-gray-500">취소</button>
  </div>
</div>

</body>
</html>
